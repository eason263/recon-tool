name: Daily Trade Recon
source: ../tests/fixtures/a.csv
target: ../tests/fixtures/b.csv

# Key columns uniquely identify each record
key: [trade_id]

# Columns to skip when comparing (e.g. audit timestamps)
ignore: [updated_at]

# Global numeric tolerance (applies to all numeric columns unless overridden)
tolerance: 0.01

# Map source column names to their counterpart names in the target file
# column_map:
#   trade_id: TradeID
#   amount: notional

matching:
  # Treat "N/A", "NULL", "none" etc. as empty string
  null_equals_empty: true

  # Case-insensitive key and value matching
  case_sensitive: false

  # Per-column tolerance overrides
  per_column:
    amount:
      tolerance: 0.005
